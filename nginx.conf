upstream php-handler {
    server nextcloud:9000;
}

server {
    listen 80;
    root /var/www/html;

    client_max_body_size 512M;
    client_body_timeout 300s;
    fastcgi_buffers 64 4K;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types
        application/atom+xml text/javascript application/javascript
        application/json application/ld+json application/manifest+json
        application/rss+xml application/vnd.geo+json application/xhtml+xml
        application/xml font/opentype image/bmp image/svg+xml image/x-icon
        text/cache-manifest text/css text/plain text/vcard text/vtt
        text/x-component text/x-cross-domain-policy;

    # Security headers
    add_header Referrer-Policy            "no-referrer"                   always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header X-Download-Options         "noopen"                        always;
    add_header X-Frame-Options            "SAMEORIGIN"                    always;
    add_header X-Permitted-Cross-Domain-Policies "none"                   always;
    add_header X-Robots-Tag               "noindex, nofollow"             always;
    add_header X-XSS-Protection           "1; mode=block"                 always;
    fastcgi_hide_header X-Powered-By;

    index index.php index.html /index.php$request_uri;

    # WebDAV redirect for Windows clients
    location = / {
        if ( $http_user_agent ~ ^DavClnt ) {
            return 302 /remote.php/webdav/$is_args$args;
        }
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # Well-known URLs (CalDAV, CardDAV)
    location ^~ /.well-known {
        location = /.well-known/carddav { return 301 /remote.php/dav/; }
        location = /.well-known/caldav  { return 301 /remote.php/dav/; }
        location /.well-known/acme-challenge    { try_files $uri $uri/ =404; }
        location /.well-known/pki-validation    { try_files $uri $uri/ =404; }
        return 301 /index.php$request_uri;
    }

    # Block sensitive paths
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { return 404; }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console)               { return 404; }

    # PHP-FPM
    location ~ \.php(?:$|/) {
        rewrite ^/(?!index|remote|public|cron)(\/[^.]*[^\/])$ /index.php$uri last;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $path_info;
        fastcgi_param HTTPS            off;
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_max_temp_file_size 0;
    }

    # Static assets — long cache
    location ~ \.(?:css|js|svg|gif|png|jpg|ico|wasm|tflite|map|ogg|flac)$ {
        try_files $uri /index.php$request_uri;
        add_header Cache-Control "public, max-age=15778463";
        access_log off;
    }

    location ~ \.woff2?$ {
        try_files $uri /index.php$request_uri;
        expires 7d;
        access_log off;
    }

    location /remote {
        return 301 /remote.php$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.php$request_uri;
    }
}
