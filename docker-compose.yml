# d-cloud — docker-compose.yml
# environment variables are injected from .env — run ./d-cloud.sh setup to generate it

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nextcloud:
    image: nextcloud:stable-fpm-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${TRUSTED_DOMAINS:-localhost}
      NEXTCLOUD_DATA_DIR: /mnt/data
    volumes:
      - nextcloud_html:/var/www/html
      - ${DISK_PATH}:/mnt/data
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
      - nextcloud_themes:/var/www/html/themes
      # Pre-installation hook to fix permissions before Nextcloud setup.
      # This ensures that the web server has the necessary permissions to write to the 
      # data directory and other relevant directories during the initial setup.
      - ./pre-install-hook.sh:/docker-entrypoint-hooks.d/pre-installation/fix-permissions.sh:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "${PORT:-7070}:80" # Expose port 80 to the host, defaulting to 7070 if not set
    volumes:
      - nextcloud_html:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  nextcloud_html:
  nextcloud_config:
  nextcloud_apps:
  nextcloud_themes:
